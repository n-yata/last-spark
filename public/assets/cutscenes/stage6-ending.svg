<svg width="960" height="540" viewBox="0 0 960 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LAST SPARK ステージ6 — だれにも管理されていない空を見上げるRAYとTERRA(エンディング)</title>
<desc>ECLIPSEの支配が解けた廃墟の外。崩れたバリケードと落書きの残る壁が前景の隅に低く沈み、画面の大半を占めるのは夜明けの広い空。藍色の夜空から星が消えゆき、地平の中央では新しい太陽が昇りはじめ、光の帯が空へ立ちのぼる。その前に、シアン色に発光するロボットRAYと少女TERRAだけが手をつなぎ、だれにも管理されていない空を並んで見上げる後ろ姿のシルエット。苦い勝利のあとの、これから歩き出す二人の始まりを描く。</desc>

<defs>
<linearGradient id="s6sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#070a1c"/>
<stop offset="0.34" stop-color="#182746"/>
<stop offset="0.6" stop-color="#3b3c63"/>
<stop offset="0.8" stop-color="#7e5f66"/>
<stop offset="1" stop-color="#d39a6c"/>
</linearGradient>
<!-- 地平に昇る新しい太陽(これから) -->
<radialGradient id="s6sun" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#fff3da" stop-opacity="0.95"/>
<stop offset="0.28" stop-color="#ffdca1" stop-opacity="0.8"/>
<stop offset="0.6" stop-color="#e9a86a" stop-opacity="0.3"/>
<stop offset="1" stop-color="#e9a86a" stop-opacity="0"/>
</radialGradient>
<!-- 太陽から空へ広がる夜明けの大気光 -->
<radialGradient id="s6bloom" cx="0.5" cy="0.78" r="0.62">
<stop offset="0" stop-color="#f6cf95" stop-opacity="0.55"/>
<stop offset="0.45" stop-color="#caa078" stop-opacity="0.18"/>
<stop offset="1" stop-color="#caa078" stop-opacity="0"/>
</radialGradient>
<linearGradient id="s6ray" x1="0" y1="1" x2="0" y2="0">
<stop offset="0" stop-color="#ffe6b8" stop-opacity="0.5"/>
<stop offset="1" stop-color="#ffe6b8" stop-opacity="0"/>
</linearGradient>
<radialGradient id="s6rayGlow" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#37f7d8" stop-opacity="0.5"/>
<stop offset="0.6" stop-color="#37f7d8" stop-opacity="0.14"/>
<stop offset="1" stop-color="#37f7d8" stop-opacity="0"/>
</radialGradient>
<!-- 視認性のためのシャドウ持ち上げ(暗部を持ち上げて視認性UP・色相維持)。エンディングの夜明けの
     明部は活かしたいので、他カットより弱めのゲイン・黒持ち上げにとどめ、苦い勝利の薄暗さは残す。
     sRGB 空間で線形変換。 -->
<filter id="lift" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
<feComponentTransfer>
<feFuncR type="linear" slope="1.18" intercept="0.05"/>
<feFuncG type="linear" slope="1.18" intercept="0.05"/>
<feFuncB type="linear" slope="1.18" intercept="0.05"/>
</feComponentTransfer>
</filter>
</defs>

<g filter="url(#lift)">
<!-- 空が主役: 画面の大半を占める夜明けの空(藍 → 地平の暖色へ) -->
<rect x="0" y="0" width="960" height="540" fill="url(#s6sky)"/>

<!-- 消えゆく星(だれにも管理されていない空) -->
<g fill="#dde4f2">
<circle cx="110" cy="52" r="1.6" opacity="0.55"/>
<circle cx="220" cy="96" r="1.2" opacity="0.4"/>
<circle cx="330" cy="40" r="1.4" opacity="0.5"/>
<circle cx="470" cy="74" r="1.1" opacity="0.32"/>
<circle cx="610" cy="50" r="1.5" opacity="0.45"/>
<circle cx="730" cy="100" r="1.2" opacity="0.38"/>
<circle cx="840" cy="44" r="1.3" opacity="0.42"/>
<circle cx="910" cy="120" r="1.1" opacity="0.32"/>
<circle cx="170" cy="150" r="1" opacity="0.26"/>
<circle cx="540" cy="160" r="0.9" opacity="0.22"/>
<circle cx="790" cy="172" r="1" opacity="0.24"/>
<circle cx="280" cy="200" r="0.8" opacity="0.18"/>
</g>

<!-- 太陽から空いっぱいに広がる夜明けの大気光 -->
<ellipse cx="480" cy="402" rx="640" ry="300" fill="url(#s6bloom)"/>

<!-- 空へ立ちのぼる光の帯(god rays・これからへの希望) -->
<g opacity="0.5">
<polygon points="480,402 360,40 408,40" fill="url(#s6ray)"/>
<polygon points="480,402 470,20 506,20" fill="url(#s6ray)" opacity="0.9"/>
<polygon points="480,402 560,40 612,40" fill="url(#s6ray)"/>
<polygon points="480,402 240,150 300,140" fill="url(#s6ray)" opacity="0.6"/>
<polygon points="480,402 700,140 760,160" fill="url(#s6ray)" opacity="0.6"/>
</g>

<!-- 横たわる雲(夜明けの光を下から受ける) -->
<g>
<g fill="#202744" opacity="0.7">
<ellipse cx="200" cy="150" rx="170" ry="16"/>
<ellipse cx="740" cy="176" rx="190" ry="18"/>
<ellipse cx="430" cy="120" rx="120" ry="11"/>
</g>
<!-- 雲の下端に乗る暖色のリム -->
<g stroke="#f0c896" stroke-width="1.4" fill="none" opacity="0.3">
<path d="M40 164 Q200 176 360 162"/>
<path d="M560 192 Q740 204 920 188"/>
</g>
</g>

<!-- 遠景: 崩れた廃墟の街並み(地平に低く沈むシルエット・苦い勝利)。
     足元は地面ライン(y=430)の下まで伸ばして接地させ、宙に浮かせない。 -->
<g fill="#161a2a">
<polygon points="0,438 0,344 54,344 54,322 86,322 86,344 132,344 132,438"/>
<polygon points="150,438 150,360 186,360 186,332 206,350 206,360 252,360 252,438"/>
<!-- 天端が割れた高層 -->
<polygon points="276,438 276,300 304,300 304,276 312,292 322,276 322,300 354,300 354,438"/>
<polygon points="700,438 700,318 736,318 736,296 758,318 758,438"/>
<polygon points="800,438 800,346 846,346 846,326 884,326 884,346 960,346 960,438"/>
</g>

<!-- 地平の太陽(昇りはじめ・これから) -->
<ellipse cx="480" cy="404" rx="300" ry="150" fill="url(#s6sun)"/>
<circle cx="480" cy="404" r="46" fill="#fff4de" opacity="0.85"/>
<circle cx="480" cy="404" r="30" fill="#fffaf0" opacity="0.95"/>

<!-- 地面(夜明けに照らされる) -->
<rect x="0" y="430" width="960" height="110" fill="#191c25"/>
<rect x="0" y="430" width="960" height="4" fill="#3a3330" opacity="0.6"/>
<g stroke="#0c0e13" stroke-width="3" opacity="0.7" fill="none">
<path d="M0 474 L 200 468 L 400 480 L 600 470 L 960 478"/>
<path d="M140 506 L 300 498 L 460 508"/>
</g>
<!-- 太陽から地面に伸びる夜明けの照り返し -->
<polygon points="452,432 508,432 560,540 400,540" fill="#f0cf9e" opacity="0.12"/>
<ellipse cx="480" cy="436" rx="280" ry="10" fill="#f4d9b0" opacity="0.14"/>

<!-- 前景右: 崩れた壁のかけら(落書き・争いの痕跡。空をふさがぬよう低く) -->
<g>
<polygon points="812,540 812,420 846,408 900,418 960,410 960,540" fill="#1b202d"/>
<polygon points="812,420 846,408 900,418 960,410 960,420 812,426" fill="#2a3350" opacity="0.5"/>
<!-- 壁のひび -->
<g stroke="#0d1019" stroke-width="2" fill="none" opacity="0.8">
<path d="M866 414 L 858 460 L 872 500 L 860 540"/>
<path d="M922 416 L 914 470 L 928 520"/>
</g>
<!-- 落書き(争いの痕跡) -->
<g stroke="#7a3b3b" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round">
<path d="M828 452 L 862 452 M845 442 L 845 484"/>
<path d="M894 500 L 922 486 M894 486 L 922 500"/>
</g>
<g stroke="#c9c2b0" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round">
<path d="M824 500 L 854 496 L 830 524 L 860 520"/>
</g>
</g>

<!-- 前景左: 倒れたバリケード(争いの跡。低く沈める) -->
<g fill="#12161f">
<polygon points="40,500 200,480 232,496 244,532 20,538"/>
</g>
<g stroke="#0a0d14" stroke-width="3" fill="none" opacity="0.8">
<line x1="60" y1="496" x2="224" y2="482"/>
<line x1="80" y1="518" x2="234" y2="504"/>
</g>
<!-- 有刺鉄線のなごり -->
<g stroke="#2a2e38" stroke-width="1.6" fill="none" opacity="0.7">
<path d="M52 482 L 94 476 L 134 482 L 174 474 L 214 480"/>
</g>
<rect x="132" y="476" width="60" height="6" fill="#7a3b3b" opacity="0.5" transform="rotate(-6 132 476)"/>

<!-- RAY と TERRA: 手をつなぎ、空を見上げる後ろ姿(中央手前・夜明けに縁取られたシルエット) -->
<!-- RAY(背面・シアンの縁取り発光) -->
<g transform="translate(452 430)">
<ellipse cx="0" cy="-60" rx="120" ry="135" fill="url(#s6rayGlow)"/>
<ellipse cx="0" cy="6" rx="58" ry="12" fill="#0a0c12" opacity="0.6"/>
<!-- 脚(背面) -->
<path d="M-22 -54 L -4 -54 L -6 4 L -26 4 Z" fill="#141f26"/>
<path d="M2 -54 L 22 -54 L 26 4 L 6 4 Z" fill="#101a20"/>
<!-- 胴(背面・肩甲のパネル) -->
<path d="M-28 -122 L 28 -122 L 22 -52 L -22 -52 Z" fill="#172730"/>
<!-- 背面の発光スリット(脊椎ライン) -->
<rect x="-3" y="-118" width="6" height="60" rx="3" fill="#37f7d8" opacity="0.5"/>
<!-- 外側の腕(下ろす) -->
<path d="M-28 -116 L -18 -114 L -30 -60 L -42 -62 Z" fill="#121d24"/>
<circle cx="-36" cy="-60" r="6" fill="#121d24"/>
<!-- 内側の腕(TERRA と手をつなぐ・右下へ) -->
<path d="M24 -116 L 34 -112 L 40 -70 L 30 -66 Z" fill="#1a2a32"/>
<!-- 頭(背面・上を向く) -->
<path d="M-16 -154 L 16 -154 L 14 -122 L -14 -122 Z" fill="#1f3038"/>
<!-- 後頭の発光リム -->
<path d="M-16 -154 L 16 -154" fill="none" stroke="#37f7d8" stroke-width="2" opacity="0.6"/>
<!-- 縁の発光ライン -->
<path d="M-28 -122 L 28 -122 L 22 -52 L -22 -52 Z" fill="none" stroke="#37f7d8" stroke-width="1.2" opacity="0.5"/>
<!-- 夜明けの暖色リム(右肩・逆光) -->
<path d="M16 -154 L 14 -122 L 22 -52" fill="none" stroke="#ffdca8" stroke-width="1.6" opacity="0.5"/>
</g>

<!-- TERRA(背面・RAY の右で手をつなぎ、空を見上げる。なだらかな体形・自然な腕でやわらかく) -->
<g transform="translate(516 436)">
<ellipse cx="0" cy="0" rx="22" ry="6" fill="#0a0c12" opacity="0.5"/>
<!-- 脚 -->
<rect x="-9" y="-32" width="8" height="32" rx="4" fill="#4a3526"/>
<rect x="2" y="-32" width="8" height="32" rx="4" fill="#54402d"/>
<rect x="-11" y="-5" width="12" height="6" rx="2" fill="#2a1f14"/>
<rect x="1" y="-5" width="12" height="6" rx="2" fill="#33251a"/>
<!-- 胴(背面・なだらかな肩〜裾) -->
<path d="M-13 -82 Q-15 -89 -8 -91 Q0 -93 8 -91 Q15 -89 13 -82 L17 -34 L-17 -34 Z" fill="#6e5239"/>
<path d="M-9 -84 Q0 -88 9 -84 L13 -36 L-13 -36 Z" fill="#856444" opacity="0.8"/>
<!-- 外側の腕(自然に下ろす) -->
<path d="M13 -83 Q19 -81 19 -73 L17 -50 Q14 -49 11 -50 L12 -78 Z" fill="#6e5239"/>
<circle cx="17" cy="-49" r="4.5" fill="#d8a98a"/>
<!-- 内側の腕(RAY と手をつなぐ・なめらかに上へ) -->
<path d="M-11 -84 Q-26 -83 -34 -71 Q-36 -68 -32 -65 Q-29 -68 -25 -71 Q-17 -78 -9 -77 Z" fill="#6e5239"/>
<circle cx="-34" cy="-67" r="4.5" fill="#d8a98a"/>
<!-- 頭(背面・やや上向き) -->
<circle cx="0" cy="-100" r="17" fill="#d8a98a"/>
<!-- 後ろ髪(なめらかなボブ + 低い毛束) -->
<path d="M-17 -104 Q-18 -120 0 -121 Q18 -120 17 -104 Q17 -90 11 -83 Q0 -87 -11 -83 Q-17 -90 -17 -104 Z" fill="#41301f"/>
<path d="M-5 -85 Q0 -79 5 -85 Q4 -75 0 -73 Q-4 -75 -5 -85 Z" fill="#41301f"/>
<!-- 夜明けの縁光(頭・肩の輪郭) -->
<path d="M-17 -104 Q-18 -120 0 -121 Q18 -120 17 -104" fill="none" stroke="#ffe6b8" stroke-width="1.4" opacity="0.5"/>
<path d="M13 -82 L17 -50" fill="none" stroke="#ffdca8" stroke-width="1.3" opacity="0.4"/>
</g>
<!-- つながれた手(2人の間の小さな接点) -->
<circle cx="484" cy="367" r="4.5" fill="#d8a98a"/>

<!-- 舞う塵(夜明けの光に浮かぶ) -->
<g fill="#f4e3c6" opacity="0.2">
<circle cx="330" cy="300" r="2"/>
<circle cx="600" cy="270" r="1.6"/>
<circle cx="270" cy="350" r="1.6"/>
<circle cx="660" cy="330" r="2"/>
<circle cx="400" cy="240" r="1.4"/>
<circle cx="720" cy="250" r="1.5"/>
</g>

<!-- ビネット(上は空を生かすため最小限) -->
<rect x="0" y="0" width="960" height="56" fill="#04060c" opacity="0.28"/>
<rect x="0" y="486" width="960" height="54" fill="#04060c" opacity="0.4"/>
<rect x="0" y="0" width="48" height="540" fill="#04060c" opacity="0.24"/>
<rect x="912" y="0" width="48" height="540" fill="#04060c" opacity="0.24"/>
</g>
</svg>
