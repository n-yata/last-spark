<svg width="960" height="540" viewBox="0 0 960 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LAST SPARK ステージ4 — 汚染地帯でRAYとTERRAが立ち尽くす</title>
<desc>毒気に淀んだ黄緑色の空の下、朽ちた工場群と立ち枯れた木々が並ぶ汚染地帯。地表には毒々しく発光する汚染溜まりが点在し、シアン色に発光するロボットRAYと、その傍らで息苦しさに口元を押さえる少女TERRAが並んで立ち尽くす一枚絵。</desc>

<defs>
<linearGradient id="s4sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#10160c"/>
<stop offset="0.45" stop-color="#1b2410"/>
<stop offset="1" stop-color="#151a0c"/>
</linearGradient>
<radialGradient id="s4sun" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#9bab4a" stop-opacity="0.45"/>
<stop offset="0.55" stop-color="#6f7a2e" stop-opacity="0.16"/>
<stop offset="1" stop-color="#6f7a2e" stop-opacity="0"/>
</radialGradient>
<linearGradient id="s4haze" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#3c4a18" stop-opacity="0"/>
<stop offset="1" stop-color="#4a5a1e" stop-opacity="0.5"/>
</linearGradient>
<radialGradient id="s4pool" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#c4e24a" stop-opacity="0.55"/>
<stop offset="0.6" stop-color="#9bc22e" stop-opacity="0.18"/>
<stop offset="1" stop-color="#9bc22e" stop-opacity="0"/>
</radialGradient>
<radialGradient id="s4rayGlow" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#37f7d8" stop-opacity="0.5"/>
<stop offset="0.6" stop-color="#37f7d8" stop-opacity="0.12"/>
<stop offset="1" stop-color="#37f7d8" stop-opacity="0"/>
</radialGradient>
</defs>

<!-- 空 -->
<rect x="0" y="0" width="960" height="540" fill="url(#s4sky)"/>

<!-- 病んだ太陽(毒気でにじむ) -->
<circle cx="300" cy="150" r="150" fill="url(#s4sun)"/>
<circle cx="300" cy="150" r="42" fill="#a7b552" opacity="0.5"/>
<circle cx="300" cy="150" r="30" fill="#c2cf6e" opacity="0.4"/>

<!-- 遠景: 朽ちた工場群(暗いシルエット。煙突・タンク・パイプ) -->
<g fill="#0f160b">
<!-- 煙突 -->
<rect x="120" y="170" width="34" height="250"/>
<rect x="116" y="166" width="42" height="12"/>
<rect x="700" y="150" width="40" height="270"/>
<rect x="696" y="146" width="48" height="12"/>
<!-- 工場棟(切妻・割れた屋根) -->
<polygon points="200,420 200,300 230,272 320,272 350,300 350,420"/>
<polygon points="380,420 380,320 540,320 540,420"/>
<polygon points="560,420 560,290 600,290 600,420"/>
<polygon points="820,420 820,310 900,310 900,288 940,288 940,420"/>
</g>
<!-- 球形タンク -->
<g fill="#121a0c">
<circle cx="440" cy="300" r="46"/>
<rect x="424" y="330" width="14" height="90"/>
<rect x="442" y="330" width="14" height="90"/>
<circle cx="640" cy="330" r="34"/>
<rect x="630" y="352" width="10" height="68"/>
<rect x="642" y="352" width="10" height="68"/>
</g>
<!-- 連絡パイプ(工場間を渡る) -->
<g stroke="#0c1209" stroke-width="9" fill="none" opacity="0.9">
<path d="M154 250 L 440 250 L 700 230"/>
<path d="M350 340 L 560 340"/>
</g>
<g stroke="#19260e" stroke-width="2" fill="none" opacity="0.7">
<path d="M154 246 L 440 246 L 700 226"/>
</g>

<!-- 毒気の霧(中景・地表付近に溜まる) -->
<rect x="0" y="300" width="960" height="160" fill="url(#s4haze)"/>
<g fill="#5a6a24" opacity="0.18">
<ellipse cx="220" cy="392" rx="180" ry="34"/>
<ellipse cx="620" cy="404" rx="220" ry="40"/>
<ellipse cx="860" cy="384" rx="150" ry="30"/>
</g>

<!-- 立ち枯れた木(汚染に侵された) -->
<g stroke="#241d10" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9">
<path d="M150 420 L 150 300"/>
<path d="M150 340 L 122 312"/>
<path d="M150 356 L 180 330"/>
<path d="M150 320 L 132 300"/>
<path d="M828 420 L 828 318"/>
<path d="M828 352 L 856 328"/>
<path d="M828 366 L 802 344"/>
</g>

<!-- 地表(汚染した地面) -->
<rect x="0" y="420" width="960" height="120" fill="#11160a"/>
<rect x="0" y="420" width="960" height="4" fill="#2a3614" opacity="0.7"/>
<g stroke="#080c05" stroke-width="3" opacity="0.8" fill="none">
<path d="M0 466 L 180 460 L 360 474 L 540 462 L 720 478 L 960 466"/>
<path d="M120 500 L 260 492 L 380 504 L 480 494"/>
<path d="M580 498 L 720 506 L 860 496 L 960 502"/>
</g>

<!-- 汚染溜まり(毒々しく発光する液だまり) -->
<ellipse cx="210" cy="486" rx="120" ry="22" fill="url(#s4pool)"/>
<ellipse cx="210" cy="486" rx="70" ry="12" fill="#d2e85a" opacity="0.3"/>
<ellipse cx="760" cy="500" rx="140" ry="24" fill="url(#s4pool)"/>
<ellipse cx="760" cy="500" rx="84" ry="13" fill="#d2e85a" opacity="0.28"/>
<ellipse cx="470" cy="512" rx="90" ry="16" fill="url(#s4pool)"/>

<!-- 立ち上る毒気の泡 -->
<g fill="#c4e24a" opacity="0.4">
<circle cx="190" cy="458" r="3"/>
<circle cx="226" cy="446" r="2.4"/>
<circle cx="208" cy="430" r="2"/>
<circle cx="742" cy="470" r="3"/>
<circle cx="778" cy="456" r="2.4"/>
<circle cx="760" cy="438" r="2"/>
</g>

<!-- RAY: 立ち姿(シアン発光ロボット)。中央やや右。 -->
<g transform="translate(560 420)">
<!-- 発光ハロ -->
<ellipse cx="0" cy="-60" rx="120" ry="130" fill="url(#s4rayGlow)"/>
<!-- 接地影 -->
<ellipse cx="0" cy="6" rx="56" ry="12" fill="#0a1206" opacity="0.6"/>
<!-- 脚 -->
<path d="M-22 -52 L -6 -52 L -8 4 L -28 4 Z" fill="#16242a"/>
<path d="M4 -52 L 22 -52 L 26 4 L 8 4 Z" fill="#1b2c33"/>
<!-- 胴 -->
<path d="M-26 -118 L 24 -118 L 18 -50 L -20 -50 Z" fill="#1d2f36"/>
<!-- 胸のコア(主発光) -->
<circle cx="-2" cy="-92" r="11" fill="#37f7d8" opacity="0.35"/>
<circle cx="-2" cy="-92" r="6" fill="#9ffff0"/>
<!-- 腕(体側・TERRA側へ少し開く) -->
<path d="M-26 -112 L -16 -110 L -30 -58 L -42 -60 Z" fill="#16242a"/>
<circle cx="-36" cy="-58" r="6" fill="#16242a"/>
<path d="M24 -112 L 34 -110 L 40 -62 L 30 -60 Z" fill="#22343c"/>
<circle cx="35" cy="-61" r="5" fill="#37f7d8"/>
<!-- 頭(前を見据える) -->
<path d="M-18 -150 L 18 -150 L 14 -120 L -14 -120 Z" fill="#243740"/>
<!-- バイザー(発光アイ) -->
<rect x="-15" y="-142" width="30" height="9" rx="4" fill="#37f7d8"/>
<rect x="-17" y="-144" width="34" height="13" rx="6" fill="#37f7d8" opacity="0.25"/>
<!-- 縁の発光ライン -->
<path d="M-26 -118 L 24 -118 L 18 -50 L -20 -50 Z" fill="none" stroke="#37f7d8" stroke-width="1.2" opacity="0.5"/>
</g>

<!-- TERRA: RAY の左で息苦しさに口元を押さえる小さな少女 -->
<g transform="translate(478 426)">
<!-- 接地影 -->
<ellipse cx="0" cy="0" rx="26" ry="7" fill="#0a1206" opacity="0.55"/>
<!-- 脚 -->
<rect x="-10" y="-34" width="9" height="34" rx="3" fill="#5e4530"/>
<rect x="2" y="-34" width="9" height="34" rx="3" fill="#6b4f38"/>
<rect x="-13" y="-6" width="14" height="7" rx="2" fill="#33251a"/>
<rect x="1" y="-6" width="14" height="7" rx="2" fill="#3a2a1c"/>
<!-- 胴(小さな上着) -->
<path d="M-16 -86 L 16 -86 L 22 -34 L -22 -34 Z" fill="#7d5e42"/>
<path d="M-11 -82 L 11 -82 L 16 -36 L -16 -36 Z" fill="#9a7650" opacity="0.85"/>
<!-- 腕: 片手を口元へ持ち上げる(咳き込む仕草) -->
<path d="M16 -80 L 24 -74 L 10 -52 L 2 -56 Z" fill="#7d5e42"/>
<path d="M2 -56 L 8 -64 L 2 -74 L -6 -70 Z" fill="#e8b89a"/>
<!-- もう一方の腕(体側) -->
<path d="M-16 -80 L -24 -74 L -20 -44 L -12 -46 Z" fill="#7d5e42"/>
<circle cx="-22" cy="-44" r="5" fill="#eac4a8"/>
<!-- 頭 -->
<circle cx="-2" cy="-98" r="20" fill="#e8b89a"/>
<!-- 髪 -->
<path d="M-22 -100 Q-20 -122 -2 -122 Q17 -122 18 -99 Q9 -113 -2 -112 Q-14 -113 -22 -100 Z" fill="#4a3522"/>
<path d="M-22 -101 Q-25 -88 -20 -81 L-15 -95 Z" fill="#4a3522"/>
<path d="M18 -100 Q21 -89 16 -82 L11 -96 Z" fill="#4a3522"/>
<!-- 目(やや伏せ気味・苦しげ) -->
<circle cx="-11" cy="-99" r="2" fill="#2a1d14"/>
<circle cx="3" cy="-99" r="2" fill="#2a1d14"/>
<!-- 口元を覆う手 -->
<ellipse cx="-3" cy="-86" rx="8" ry="5" fill="#eac4a8"/>
</g>

<!-- 舞う汚染の微粒子 -->
<g fill="#aecb4e" opacity="0.22">
<circle cx="380" cy="240" r="2"/>
<circle cx="500" cy="200" r="1.6"/>
<circle cx="640" cy="260" r="2"/>
<circle cx="340" cy="300" r="1.6"/>
<circle cx="720" cy="220" r="1.6"/>
<circle cx="260" cy="260" r="1.8"/>
<circle cx="560" cy="160" r="1.4"/>
</g>

<!-- ビネット -->
<rect x="0" y="0" width="960" height="120" fill="#070a04" opacity="0.5"/>
<rect x="0" y="470" width="960" height="70" fill="#070a04" opacity="0.45"/>
<rect x="0" y="0" width="70" height="540" fill="#070a04" opacity="0.3"/>
<rect x="890" y="0" width="70" height="540" fill="#070a04" opacity="0.3"/>
</svg>
