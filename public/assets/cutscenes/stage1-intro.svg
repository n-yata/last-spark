<svg width="960" height="540" viewBox="0 0 960 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LAST SPARK ステージ1 — 崩れた都市でRAYが目覚める</title>
<desc>錆と蔓草に覆われた文明崩壊後の都市の廃墟。割れた高層ビルのシルエットが夜明け前の空に立ち並び、ひび割れた地面でシアン色に発光するロボットRAYが静かに身を起こす一枚絵。</desc>

<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0a1016"/>
<stop offset="0.5" stop-color="#0d1a1d"/>
<stop offset="1" stop-color="#0c1411"/>
</linearGradient>
<linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#3a2a1e" stop-opacity="0"/>
<stop offset="1" stop-color="#5a3a22" stop-opacity="0.55"/>
</linearGradient>
<radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#2c3e3c"/>
<stop offset="0.7" stop-color="#1a2826"/>
<stop offset="1" stop-color="#10201d" stop-opacity="0"/>
</radialGradient>
<radialGradient id="rayGlow" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#37f7d8" stop-opacity="0.5"/>
<stop offset="0.6" stop-color="#37f7d8" stop-opacity="0.12"/>
<stop offset="1" stop-color="#37f7d8" stop-opacity="0"/>
</radialGradient>
<!-- 視認性のためのシャドウ持ち上げ(全体を明度UP・色相維持)。load.svg はブラウザで
     ラスタライズされ defs 参照(グラデーション同様)が描画されるため、このフィルタも適用される。
     sRGB 空間で線形変換(slope=ゲイン, intercept=黒の持ち上げ)。 -->
<filter id="lift" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
<feComponentTransfer>
<feFuncR type="linear" slope="1.34" intercept="0.075"/>
<feFuncG type="linear" slope="1.34" intercept="0.075"/>
<feFuncB type="linear" slope="1.34" intercept="0.075"/>
</feComponentTransfer>
</filter>
</defs>

<g filter="url(#lift)">
<!-- 空 -->
<rect x="0" y="0" width="960" height="540" fill="url(#sky)"/>

<!-- 弱い月明かり -->
<circle cx="752" cy="118" r="120" fill="url(#moon)"/>
<circle cx="752" cy="118" r="40" fill="#22322f" opacity="0.7"/>
<circle cx="752" cy="118" r="34" fill="#2e413d" opacity="0.5"/>

<!-- 遠景: 崩れた高層ビル群(暗いシルエット) -->
<g fill="#0e1519">
<polygon points="20,420 20,150 70,150 70,120 96,120 96,150 120,150 120,180 150,180 150,420"/>
<polygon points="180,420 180,210 210,210 210,170 232,196 232,210 262,210 262,420"/>
<polygon points="300,420 300,96 326,96 326,72 346,72 346,96 372,96 372,140 398,140 398,420"/>
<polygon points="430,420 430,180 470,180 470,150 496,150 496,210 520,210 520,420"/>
<polygon points="560,420 560,130 590,130 590,104 612,128 612,130 648,130 648,420"/>
<polygon points="690,420 690,200 720,200 720,170 744,170 744,200 770,200 770,420"/>
<polygon points="812,420 812,150 838,150 838,118 860,118 860,150 900,150 900,180 930,180 930,420"/>
</g>

<!-- 中景: 一段手前のビル(やや明るい・割れた天端) -->
<g fill="#141d22">
<polygon points="60,440 60,250 110,250 110,224 134,250 134,440"/>
<polygon points="250,440 250,300 250,260 286,260 286,236 308,236 308,300 340,300 340,440"/>
<polygon points="470,440 470,224 510,224 510,196 520,210 540,196 540,224 576,224 576,440"/>
<polygon points="720,440 720,272 760,272 760,244 784,270 784,272 820,272 820,440"/>
</g>

<!-- 錆の縦ストリーク(中景ビル表面) -->
<g>
<rect x="84" y="252" width="10" height="186" fill="url(#rust)"/>
<rect x="300" y="262" width="9" height="178" fill="url(#rust)"/>
<rect x="500" y="226" width="11" height="214" fill="url(#rust)"/>
<rect x="752" y="274" width="10" height="166" fill="url(#rust)"/>
</g>

<!-- 割れた窓(冷たい闇。ごく一部だけ朽ちた残光) -->
<g fill="#070d0e">
<rect x="74" y="280" width="14" height="18"/>
<rect x="100" y="280" width="14" height="18"/>
<rect x="74" y="320" width="14" height="18"/>
<rect x="262" y="290" width="16" height="20"/>
<rect x="290" y="290" width="16" height="20"/>
<rect x="262" y="330" width="16" height="20"/>
<rect x="484" y="250" width="16" height="20"/>
<rect x="512" y="250" width="16" height="20"/>
<rect x="484" y="292" width="16" height="20"/>
<rect x="512" y="292" width="16" height="20"/>
<rect x="732" y="300" width="16" height="20"/>
<rect x="760" y="300" width="16" height="20"/>
</g>
<g fill="#caa15a" opacity="0.22">
<rect x="100" y="320" width="14" height="18"/>
<rect x="290" y="330" width="16" height="20"/>
<rect x="512" y="334" width="16" height="20"/>
</g>

<!-- 蔓草(ビルを這い上がる) -->
<g stroke="#1f3a24" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round">
<path d="M70 440 C 60 400, 84 372, 72 330 S 92 286, 80 252"/>
<path d="M126 440 C 134 404, 116 376, 128 338 S 112 300, 122 268"/>
<path d="M508 440 C 498 402, 520 372, 506 330 S 524 286, 512 240"/>
<path d="M760 440 C 752 408, 770 382, 758 344 S 774 304, 762 278"/>
</g>
<g fill="#2c5230" opacity="0.8">
<circle cx="74" cy="356" r="5"/><circle cx="80" cy="300" r="4"/><circle cx="69" cy="392" r="4"/>
<circle cx="124" cy="360" r="5"/><circle cx="119" cy="300" r="4"/><circle cx="129" cy="404" r="4"/>
<circle cx="510" cy="350" r="5"/><circle cx="513" cy="288" r="4"/><circle cx="503" cy="396" r="4"/>
<circle cx="758" cy="360" r="5"/><circle cx="763" cy="306" r="4"/><circle cx="753" cy="402" r="4"/>
</g>

<!-- 地表(ひび割れた地面) -->
<rect x="0" y="420" width="960" height="120" fill="#0b1310"/>
<rect x="0" y="420" width="960" height="4" fill="#1a2a22" opacity="0.7"/>
<g stroke="#060b09" stroke-width="3" opacity="0.8" fill="none">
<path d="M0 470 L 180 462 L 340 478 L 520 466 L 700 482 L 960 470"/>
<path d="M120 500 L 240 492 L 360 504 L 470 494"/>
<path d="M560 498 L 700 506 L 840 496 L 960 504"/>
<path d="M300 478 L 312 510 L 296 540"/>
<path d="M676 482 L 690 512 L 678 540"/>
</g>
<!-- 地面に伸びる蔓草 -->
<g stroke="#1f3a24" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round">
<path d="M210 440 C 250 452, 230 472, 280 470"/>
<path d="M820 440 C 786 452, 812 474, 760 472"/>
</g>

<!-- 倒れた残骸(手前左) -->
<g fill="#10181a">
<polygon points="120,470 250,452 270,470 280,506 110,512"/>
</g>
<rect x="150" y="464" width="70" height="8" fill="url(#rust)" transform="rotate(-7 150 464)"/>

<!-- RAY: 廃墟で身を起こすロボット(シアン発光) -->
<g transform="translate(470 392)">
<!-- 発光ハロ -->
<ellipse cx="0" cy="-30" rx="120" ry="120" fill="url(#rayGlow)"/>
<!-- 地面の接地影 -->
<ellipse cx="6" cy="44" rx="58" ry="12" fill="#04140f" opacity="0.6"/>

<!-- 後ろ脚(地に着く) -->
<path d="M-26 6 L -10 6 L -16 44 L -34 44 Z" fill="#16242a"/>
<!-- 前脚(膝を立てる) -->
<path d="M2 4 L 22 10 L 40 40 L 22 46 L 12 24 Z" fill="#1b2c33"/>
<!-- 胴(前傾・起き上がる姿勢) -->
<path d="M-30 -34 L 6 -44 L 22 4 L -20 12 Z" fill="#1d2f36"/>
<!-- 胸のコア(主発光) -->
<circle cx="-8" cy="-14" r="10" fill="#37f7d8" opacity="0.35"/>
<circle cx="-8" cy="-14" r="6" fill="#9ffff0"/>
<!-- 地面につく腕(支える) -->
<path d="M-30 -22 L -22 -16 L -44 26 L -54 22 Z" fill="#16242a"/>
<circle cx="-50" cy="26" r="6" fill="#16242a"/>
<!-- もう一方の腕(砲・体側) -->
<path d="M2 -30 L 14 -26 L 30 6 L 18 10 Z" fill="#22343c"/>
<circle cx="26" cy="6" r="5" fill="#37f7d8"/>
<!-- 頭(うつむきから上げる) -->
<path d="M-24 -56 L 2 -62 L 8 -40 L -18 -34 Z" fill="#243740"/>
<!-- バイザー(発光アイ) -->
<rect x="-20" y="-52" width="24" height="7" rx="3" fill="#37f7d8" transform="rotate(-12 -8 -48)"/>
<rect x="-22" y="-53" width="28" height="11" rx="5" fill="#37f7d8" opacity="0.25" transform="rotate(-12 -8 -48)"/>
<!-- 縁の発光ライン -->
<path d="M-30 -34 L 6 -44 L 22 4 L -20 12 Z" fill="none" stroke="#37f7d8" stroke-width="1.2" opacity="0.5"/>
</g>

<!-- 舞う塵(空気感) -->
<g fill="#6cf0ff" opacity="0.18">
<circle cx="420" cy="300" r="2"/>
<circle cx="540" cy="260" r="1.6"/>
<circle cx="610" cy="330" r="2"/>
<circle cx="360" cy="350" r="1.6"/>
<circle cx="700" cy="280" r="1.6"/>
</g>

<!-- ビネット(四隅を沈める) -->
<rect x="0" y="0" width="960" height="120" fill="#05080a" opacity="0.5"/>
<rect x="0" y="470" width="960" height="70" fill="#05080a" opacity="0.45"/>
</g>
</svg>
