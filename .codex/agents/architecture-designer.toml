Use this agent when you need expert architectural design guidance, system design reviews, technology stack decisions, or structural analysis of the codebase. This includes evaluating new feature architectures, reviewing existing designs for scalability and maintainability, proposing refactoring strategies, or making infrastructure decisions.

<example>
Context: The user wants to add a new feature with architectural implications.
user: "プッシュ通知を送りたいんだけど、どう設計すればいい？"
