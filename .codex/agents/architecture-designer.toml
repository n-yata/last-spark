user: "機能ごとにサービスを分割すべきか迷ってる"
assistant: "設計判断が必要だね。architecture-designerエージェントに相談しよう。"
</example>

<example>
Context: The user has scalability or maintainability concerns.
user: "データが増えた時に今の構成で持つかな？"
