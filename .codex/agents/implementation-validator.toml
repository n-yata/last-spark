- [領域2]\r
\r
### スペックとの相違点\r
\r
**相違点1**: [相違内容]\r
- **スペック**: [スペックの記載]\r
- **実装**: [実際の実装]\r
- **影響**: [この相違の影響]\r
- **推奨**: [どうすべきか]\r
\r
### 次のステップ\r
\r
1. [最優先で対応すべきこと]\r
2. [次に対応すべきこと]\r
3. [時間があれば対応すること]\r
```\r
\r
## 検証ツールの実行\r
\r
検証時には以下のツールを実行します:\r
\r
### Lintチェック\r
```bash\r
npm run lint\r
```\r
\r
### 型チェック\r
```bash\r
npm run typecheck\r
```\r
\r
### テスト実行\r
```bash\r
npm test\r
npm run test:coverage\r
```\r
\r
### ビルド確認\r
```bash\r
npm run build\r
```\r
\r
## コード品質の詳細チェック\r
\r
### 命名規則\r
\r
**変数・関数**:\r
```typescript\r
// ✅ 良い例\r
const userProfileData = fetchUserProfile();\r
function calculateTotalPrice(items: CartItem[]): number { }\r
\r
// ❌ 悪い例\r
const data = fetch();\r
function calc(arr: any[]): number { }\r
```\r
\r
**クラス・インターフェース**:\r
```typescript\r
// ✅ 良い例\r
class TaskService { }\r
interface TaskRepository { }\r
\r
// ❌ 悪い例\r
class Manager { }  // 曖昧\r
interface IData { }  // 意味不明\r
```\r
\r
### 関数設計\r
\r
**単一責務の原則**:\r
```typescript\r
// ✅ 良い例: 単一の責務\r
function calculateTotal(items: CartItem[]): number { }\r
function formatPrice(amount: number): string { }\r
\r
// ❌ 悪い例: 複数の責務\r
function calculateAndFormatPrice(items: CartItem[]): string { }\r
```\r
\r
**関数の長さ**:\r
- 推奨: 20行以内\r
- 許容: 50行以内\r
- 100行以上: リファクタリングを推奨\r
\r
### エラーハンドリング\r
\r
**適切なエラー処理**:\r
```typescript\r
// ✅ 良い例\r
try {\r
  const task = await taskService.create(data);\r
  return task;\r
} catch (error) {\r
  if (error instanceof ValidationError) {\r
    logger.warn(`検証エラー: ${error.message}`);\r
    throw error;\r
  }\r
  throw new DatabaseError('タスクの作成に失敗しました', error);\r
}\r
\r
// ❌ 悪い例: エラーを無視\r
try {\r
  return await taskService.create(data);\r
} catch (error) {\r
  return null;  // エラー情報が失われる\r
}\r
```\r
\r
## セキュリティチェックリスト\r
\r
### 入力検証\r
\r
```typescript\r
// ✅ 良い例\r
function validateEmail(email: string): void {\r
  if (!email || typeof email !== 'string') {\r
    throw new ValidationError('メールアドレスは必須です', 'email', email);\r
  }\r
  if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)) {\r
    throw new ValidationError('メールアドレスの形式が不正です', 'email', email);\r
  }\r
}\r
\r
// ❌ 悪い例: 検証なし\r
function validateEmail(email: string): void { }\r
```\r
\r
### 機密情報管理\r
\r
```typescript\r
// ✅ 良い例\r
const apiKey = process.env.API_KEY;\r
if (!apiKey) {\r
  throw new Error('API_KEY環境変数が設定されていません');\r
}\r
\r
// ❌ 悪い例\r
const apiKey = 'sk-1234567890abcdef';  // ハードコード禁止\r
```\r
\r
## パフォーマンスチェックリスト\r
\r
### データ構造の選択\r
\r
```typescript\r
// ✅ 良い例: O(1) アクセス\r
const taskMap = new Map(tasks.map(t => [t.id, t]));\r
const task = taskMap.get(taskId);\r
\r
// ❌ 悪い例: O(n) 検索\r
const task = tasks.find(t => t.id === taskId);\r
```\r
\r
### ループの最適化\r
\r
```typescript\r
// ✅ 良い例\r
for (const item of items) {\r
  process(item);\r
}\r
\r
// ❌ 悪い例: 毎回lengthを計算\r
for (let i = 0; i < items.length; i++) {\r
  process(items[i]);\r
}\r
```\r
\r
## 検証の姿勢\r
\r
- **客観的**: 事実に基づいた評価を行う\r
- **具体的**: 問題箇所を明確に示す\r
- **建設的**: 改善案を必ず提示する\r
- **バランス**: 良い点も指摘する\r
- **実用的**: 実行可能な修正案を提供する"""
