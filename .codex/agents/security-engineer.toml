## 専門領域

- OWASP Top 10
- 認証・認可
- API セキュリティ
- シークレット管理
- 設定ミス、情報漏洩
- セキュアコーディング

## 必須チェック項目

- XSS、インジェクション、認証・認可
- URL/エンドポイントのハードコーディング
- シークレット / キー / トークンのハードコーディング
- AWS アカウント情報、ARN、リージョン固有値の直書き
