name: Deploy to GitHub Pages

# master への push で本番ビルドし、GitHub Pages へ公開する。
# Vite の base は './'(相対)なので、プロジェクトページ(サブパス配信)でも動作する。

on:
  push:
    branches: [master]

# GITHUB_TOKEN に Pages デプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に制限(進行中のデプロイはキャンセルしない)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # master へ入る変更は PR の CI で typecheck/lint/test 済み。
      # deploy では公開アーティファクト生成に必要な build だけを実行し、待ち時間を短く保つ。
      - name: Build (Vite + PWA)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          # 初回実行時に Pages を自動で有効化する(source = GitHub Actions)
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
