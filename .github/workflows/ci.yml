name: CI

# PR では verify(typecheck/lint/unit/build)だけを回し、待ち時間を最小化する。
# e2e-smoke / e2e-full は workflow_dispatch から明示実行する。
on:
  pull_request:
  workflow_dispatch:
    inputs:
      e2e_suite:
        description: 'E2E suite to run'
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full

# 検証のみ。書き込み権限は与えない。
permissions:
  contents: read

# 同一ブランチで新しい push が来たら、進行中の古い実行はキャンセルする。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm test

      - name: Build (Vite + PWA)
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    # リリース速度優先のため、PR では走らせない。必要な時だけ手動で smoke を実行する。
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.e2e_suite == 'smoke' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # cache miss: ブラウザ本体 + OS依存ライブラリの両方を入れる。
      - name: Install Playwright browser (chromium, with deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # cache hit: ブラウザ本体はキャッシュから復元済みなので、OS依存ライブラリのみ入れる。
      - name: Install Playwright OS dependencies only (chromium)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Smoke E2E は Pixel 5 landscape(chromium)のみ使用。webServer は playwright.config.ts が
      # `npm run build && npm run preview` で自動起動するため、ここでの明示ビルドは不要。
      - name: Smoke E2E tests (Playwright)
        run: npm run test:e2e:smoke

  e2e-full:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.e2e_suite == 'full' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # cache miss: ブラウザ本体 + OS依存ライブラリの両方を入れる。
      - name: Install Playwright browser (chromium, with deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # cache hit: ブラウザ本体はキャッシュから復元済みなので、OS依存ライブラリのみ入れる。
      - name: Install Playwright OS dependencies only (chromium)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Full E2E tests (Playwright)
        run: npm run test:e2e
