name: CI

# PR と feature 系ブランチへの push で検証する。
# master への push は deploy.yml が本番ビルド/デプロイ時に同等の検証を行うため、ここでは対象外。
on:
  pull_request:
  push:
    branches-ignore: [master]

# 検証のみ。書き込み権限は与えない。
permissions:
  contents: read

# 同一ブランチで新しい push が来たら、進行中の古い実行はキャンセルする。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm test

      - name: Build (Vite + PWA)
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    # CI 環境での Phaser + Playwright の安定性が未確認のため、当面は非ブロッキングで導入する。
    # (headless での縦持ち判定による pause 凍結など、実機特有の不安定要因がある。)
    # 数回グリーンを確認できたら continue-on-error を外し、必須ゲートへ昇格する(別PR)。
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # E2E は Pixel 5 landscape(chromium)のみ使用。webServer は playwright.config.ts が
      # `npm run build && npm run preview` で自動起動するため、ここでの明示ビルドは不要。
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e
